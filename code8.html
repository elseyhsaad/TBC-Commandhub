<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حملة تحدي المحترفين</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&amp;family=Noto+Kufi+Arabic:wght@400;600;700&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .timeline-wrapper {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .heading-font { font-family: 'Cormorant Garamond', 'Noto Kufi Arabic', serif; }
    .body-font { font-family: 'Source Sans 3', 'Noto Kufi Arabic', sans-serif; }

    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      transform: translateX(-50%);
    }

    @media (max-width: 768px) {
      .timeline-line { left: 24px; }
    }

    .event-card {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .event-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .event-card:nth-child(odd) { animation-delay: 0.1s; }
    .event-card:nth-child(even) { animation-delay: 0.2s; }

    .expand-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
    }
    .expand-content.open {
      max-height: 600px;
      padding-top: 12px;
    }

    .dot-pulse {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
    }

    .civ-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .filter-btn {
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .filter-btn.active {
      transform: scale(1.05);
    }

    .hero-pattern {
      background-image:
        radial-gradient(circle at 20% 50%, rgba(212,175,55,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139,90,43,0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(75,85,99,0.05) 0%, transparent 50%);
    }

    .card-glow:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 0 0 1px rgba(212,175,55,0.2);
    }

    .progress-bar {
      height: 4px;
      border-radius: 2px;
      transition: width 0.8s ease;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #c5a028; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="timeline-wrapper" style="background-color: #0f0f23;"><!-- Hero Header -->
   <header class="hero-pattern relative overflow-hidden" style="padding: 48px 24px 36px;">
    <div class="max-w-4xl mx-auto text-center relative z-10">
     <div class="inline-flex items-center gap-2 mb-4 px-4 py-1.5 rounded-full" style="background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3);"><i data-lucide="rocket" style="width:16px;height:16px;color:#d4af37;"></i> <span class="body-font text-sm" style="color:#d4af37; letter-spacing:0.1em; text-transform:uppercase;">حملة حصرية</span>
     </div>
     <h1 id="main-title" class="heading-font text-4xl md:text-5xl lg:text-6xl font-bold mb-3" style="color:#f5f0e8; line-height:1.15;">حملة تحدي المحترفين</h1>
     <p id="main-subtitle" class="body-font text-lg md:text-xl mb-6" style="color:#a0977d;">انضم إلى أقوى الأفكار والمشاريع · فرصتك لتحقيق النجاح</p><!-- Stats Row -->
     <div class="flex justify-center gap-6 md:gap-10 mb-6">
      <div class="text-center">
       <div class="heading-font text-2xl font-bold" style="color:#d4af37;">
        3
       </div>
       <div class="body-font text-xs uppercase tracking-wider" style="color:#7a7160;">
        مراحل أساسية
       </div>
      </div>
      <div style="width:1px; background:rgba(212,175,55,0.3);"></div>
      <div class="text-center">
       <div class="heading-font text-2xl font-bold" style="color:#d4af37;">
        15%
       </div>
       <div class="body-font text-xs uppercase tracking-wider" style="color:#7a7160;">
        نسبة أرباحك
       </div>
      </div>
      <div style="width:1px; background:rgba(212,175,55,0.3);"></div>
      <div class="text-center">
       <div class="heading-font text-2xl font-bold" style="color:#d4af37;">
        250$
       </div>
       <div class="body-font text-xs uppercase tracking-wider" style="color:#7a7160;">
        سعر الدخول
       </div>
      </div>
     </div><!-- Filter Buttons -->
     <div class="flex flex-wrap justify-center gap-3" id="filter-container"><button class="filter-btn active civ-badge body-font" data-filter="all" style="background:rgba(212,175,55,0.2); color:#d4af37; border-color:#d4af37; padding:6px 16px; font-size:0.85rem; cursor:pointer;"> <i data-lucide="zap" style="width:14px;height:14px;"></i> جميع المراحل </button> <button class="filter-btn civ-badge body-font" data-filter="eligible" style="background:rgba(234,179,8,0.1); color:#eab308; border-color:transparent; padding:6px 16px; font-size:0.85rem; cursor:pointer;"> ✓ من يستحق </button> <button class="filter-btn civ-badge body-font" data-filter="benefits" style="background:rgba(96,165,250,0.1); color:#60a5fa; border-color:transparent; padding:6px 16px; font-size:0.85rem; cursor:pointer;"> 🎁 المميزات </button> <button class="filter-btn civ-badge body-font" data-filter="join" style="background:rgba(248,113,113,0.1); color:#f87171; border-color:transparent; padding:6px 16px; font-size:0.85rem; cursor:pointer;"> 🚀 كيفية الاشتراك </button>
     </div>
    </div><!-- Decorative bottom border -->
    <div class="absolute bottom-0 left-0 right-0 h-px" style="background: linear-gradient(90deg, transparent, #d4af37, transparent);"></div>
   </header><!-- Progress Indicator -->
   <div class="sticky top-0 z-50" style="background: rgba(15,15,35,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(212,175,55,0.15);">
    <div class="progress-bar" id="progress-bar" style="width:0%; background: linear-gradient(90deg, #d4af37, #f5d062);"></div>
    <div class="max-w-4xl mx-auto px-4 py-2 flex justify-between items-center"><span class="body-font text-xs" style="color:#7a7160;" id="progress-text">مرّر للاستكشاف</span> <span class="body-font text-xs" style="color:#d4af37;" id="current-era"></span>
    </div>
   </div><!-- Timeline Container -->
   <main class="relative max-w-5xl mx-auto px-4 py-12" id="timeline-container" role="main">
    <div class="timeline-line" style="background: linear-gradient(180deg, #d4af37 0%, rgba(212,175,55,0.2) 100%);"></div>
    <div id="events-list" class="relative"></div>
   </main><!-- Footer -->
   <footer class="text-center py-8 px-4" style="border-top: 1px solid rgba(212,175,55,0.15);">
    <p id="footer-text" class="body-font text-sm" style="color:#5a5345;">🚀 حققّ أحلامك مع أفضل الفرص في السوق</p>
   </footer>
  </div>
  <script>
    // ═══════════════════════════════════════
    // CAMPAIGN DATA
    // ═══════════════════════════════════════
    const campaignSections = [
      {
        id: 1,
        type: 'eligible',
        category: 'من يستحق هذه الحملة',
        icon: '✓',
        title: 'من يستحق الانضمام؟',
        summary: 'تعرف على الشروط والمتطلبات للانضمام إلى حملتنا الحصرية.',
        details: 'هذه الحملة مخصصة للأفراد الطموحين الذين يملكون الإرادة والقدرة على تحقيق النجاح.',
        items: [
          {
            title: 'حساب مستوى 10',
            description: 'إذا كنت تمتلك حساباً بمستوى 10 في النظام، فأنت مؤهل مباشرة للانضمام إلى الحملة.'
          },
          {
            title: 'فكرة قوية',
            description: 'إذا كانت لديك الثقة بقوة فكرتك أمام الداعمين والمقيمين، يمكنك تقديمها للتقييم.'
          },
          {
            title: 'تجربة الحظ',
            description: 'إذا كنت ترغب بتجربة حظك والدخول في منافسة شريفة، الأبواب مفتوحة أمامك.'
          }
        ],
        funFact: 'أكثر من 500+ متقدم انضموا العام الماضي وحققوا أحلامهم! 🌟'
      },
      {
        id: 2,
        type: 'benefits',
        category: 'ماذا ستحصل عليه',
        icon: '🎁',
        title: 'مميزات الانضمام',
        summary: 'اكتشف الفوائد والامتيازات التي تنتظرك داخل الحملة.',
        details: 'دخولك الحملة يفتح لك أبواباً واسعة من الفرص والمميزات الحصرية.',
        items: [
          {
            title: 'فتح حسابك في المرحلة 3',
            description: 'مرحلة الترشيح للدعم - يتم فيها دراسة فكرتك مع فريق التقييم المتخصص.'
          },
          {
            title: 'بوابة الدعم الثلاثية',
            description: 'تحصل على بوابة دعم لتقديم 3 أفكار مختلفة متميزة وفريدة من نوعها.'
          },
          {
            title: 'امتياز التحويل',
            description: 'إمكانية التحويل بين الحسابات بسهولة وأمان وحرية كاملة.'
          },
          {
            title: 'تحدي جوائز الحظ',
            description: 'دخول حصري لتحدي جوائز الحظ والكروت الخاصة والجوائز المغرية.'
          },
          {
            title: 'سحب الأرباح',
            description: 'إمكانية سحب من الرصيد الذي تربحه من المسابقات والمبيعات والعمولات.'
          },
          {
            title: 'أرباح عالية',
            description: 'النسبة المئوية لأرباحك تصل إلى 15% من إجمالي مبيعاتك وإيراداتك.'
          }
        ],
        funFact: 'أعضاؤنا يحققون متوسط دخل شهري يزيد عن $5,000 USD 💰'
      },
      {
        id: 3,
        type: 'join',
        category: 'كيفية الاشتراك',
        icon: '🚀',
        title: 'طرق الانضمام',
        summary: 'اختر الطريقة التي تناسبك للدخول إلى حملة تحدي المحترفين.',
        details: 'لديك خيارات متعددة للانضمام - إما الشراء المباشر أو من خلال تحقيق متطلبات المرحلة الأولى.',
        items: [
          {
            title: '🛍️ الشراء المباشر',
            description: 'قم بشراء الحملة بشكل مباشر بقيمة 250 دولار أمريكي وادخل فوراً.'
          },
          {
            title: '⭐ الطريق البديل - الخيار 1',
            description: 'احصل على 500 نقطة من المرحلة الأولى (مرحلة الألعاب والتحديات).'
          },
          {
            title: '🎴 الطريق البديل - الخيار 2',
            description: 'امتلك 10 كروت دعم من المرحلة الأولى كامل التفاعل معها.'
          },
          {
            title: '🎰 الطريق البديل - الخيار 3',
            description: 'احصل على 1 كرت حظ واحد على الأقل من المرحلة الأولى.'
          },
          {
            title: '🎯 الطريق البديل - الخيار 4',
            description: 'أكمل تحديد المسار في المرحلة الأولى بنجاح وامتياز.'
          }
        ],
        funFact: '80% من المشاركين اختاروا الطريق البديل وحققوا هدفهم بنجاح! 🎯'
      }
    ];

    // ═══════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════
    let currentFilter = 'all';
    let expandedCards = new Set();

    const sectionStyles = {
      eligible: { color: '#eab308', bg: 'rgba(234,179,8,0.1)', border: 'rgba(234,179,8,0.3)', bgCard: 'rgba(234,179,8,0.05)' },
      benefits: { color: '#60a5fa', bg: 'rgba(96,165,250,0.1)', border: 'rgba(96,165,250,0.3)', bgCard: 'rgba(96,165,250,0.05)' },
      join:     { color: '#f87171', bg: 'rgba(248,113,113,0.1)', border: 'rgba(248,113,113,0.3)', bgCard: 'rgba(248,113,113,0.05)' }
    };

    // ═══════════════════════════════════════
    // RENDER CAMPAIGN
    // ═══════════════════════════════════════
    function renderCampaign() {
      const container = document.getElementById('events-list');
      const filtered = currentFilter === 'all'
        ? campaignSections
        : campaignSections.filter(e => e.type === currentFilter);

      container.innerHTML = '';

      filtered.forEach((section, index) => {
        const style = sectionStyles[section.type];
        const isExpanded = expandedCards.has(section.id);

        const card = document.createElement('div');
        card.className = `event-card relative flex items-start mb-10 md:mb-14`;
        card.dataset.eventId = section.id;
        card.dataset.type = section.type;

        card.innerHTML = `
          <!-- Timeline Dot -->
          <div class="absolute dot-pulse z-10 rounded-full"
            style="width:18px;height:18px;background:${style.color};border:3px solid #0f0f23;
            left:50%;top:24px;transform:translateX(-50%);
            ${window.innerWidth <= 768 ? 'left:24px;' : ''}">
          </div>

          <!-- Section Number -->
          <div class="hidden md:flex absolute items-center justify-center"
            style="right:50%;padding-right:40px;top:18px;">
            <span class="heading-font text-lg font-bold whitespace-nowrap" style="color:${style.color};">
              المرحلة ${section.id}
            </span>
          </div>

          <!-- Card -->
          <div class="w-full md:w-[calc(50%-40px)] md:mr-auto md:pr-6 pl-14 md:pl-0">
            <div class="card-glow rounded-xl p-5 cursor-pointer transition-all duration-300"
              style="background:rgba(26,26,50,0.9);border:1px solid ${isExpanded ? style.border : 'rgba(212,175,55,0.1)'};"
              onclick="toggleCard(${section.id})" role="button" tabindex="0"
              aria-expanded="${isExpanded}" aria-label="Section: ${section.title}">

              <!-- Mobile section number -->
              <div class="md:hidden mb-2">
                <span class="heading-font text-sm font-bold" style="color:${style.color};">المرحلة ${section.id}</span>
              </div>

              <!-- Header -->
              <div class="flex items-start justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                  <span class="text-3xl">${section.icon}</span>
                  <div style="text-align: right;">
                    <h3 class="heading-font text-lg font-bold" style="color:#f5f0e8;">${section.title}</h3>
                    <span class="civ-badge mt-1" style="background:${style.bg};color:${style.color};border:1px solid ${style.border}; padding: 4px 12px;">
                      ${section.category}
                    </span>
                  </div>
                </div>
                <div class="flex-shrink-0 mt-1 transition-transform duration-300" style="color:#7a7160; transform:rotate(${isExpanded ? '180deg' : '0deg'});">
                  <i data-lucide="chevron-down" style="width:20px;height:20px;"></i>
                </div>
              </div>

              <p class="body-font text-sm leading-relaxed mt-2" style="color:#a0977d;">${section.summary}</p>

              <!-- Expandable Content -->
              <div class="expand-content ${isExpanded ? 'open' : ''}">
                <div style="border-top:1px solid rgba(212,175,55,0.15);padding-top:12px;margin-top:4px;">
                  <p class="body-font text-sm leading-relaxed mb-4" style="color:#c4b99a;">${section.details}</p>
                  
                  <!-- Items List -->
                  <div class="space-y-3 mb-4">
                    ${section.items.map((item, idx) => `
                      <div class="rounded-lg p-3" style="background:${style.bgCard};border:1px solid ${style.border};">
                        <div class="heading-font font-bold" style="color:${style.color}; font-size: 0.95rem;">
                          ${item.title}
                        </div>
                        <p class="body-font text-sm mt-1" style="color:#c4b99a;">${item.description}</p>
                      </div>
                    `).join('')}
                  </div>

                  <!-- Fun Fact -->
                  <div class="rounded-lg p-3" style="background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.15);">
                    <div class="flex items-start gap-2">
                      <span class="text-base mt-0.5">💡</span>
                      <div>
                        <span class="body-font text-xs font-bold uppercase tracking-wider" style="color:#d4af37;">معلومة مهمة</span>
                        <p class="body-font text-sm mt-1" style="color:#c4b99a;">${section.funFact}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

        container.appendChild(card);
      });

      lucide.createIcons();

      requestAnimationFrame(() => {
        observeCards();
      });
    }

    // ═══════════════════════════════════════
    // INTERACTIONS
    // ═══════════════════════════════════════
    function toggleCard(id) {
      if (expandedCards.has(id)) {
        expandedCards.delete(id);
      } else {
        expandedCards.add(id);
      }
      renderCampaign();
    }

    function setFilter(filter) {
      currentFilter = filter;
      expandedCards.clear();
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const f = btn.dataset.filter;
        const isActive = f === filter;
        btn.classList.toggle('active', isActive);
        if (isActive) {
          btn.style.borderColor = f === 'all' ? '#d4af37' :
            f === 'eligible' ? '#eab308' : f === 'benefits' ? '#60a5fa' : '#f87171';
        } else {
          btn.style.borderColor = 'transparent';
        }
      });
      renderCampaign();
    }

    // ═══════════════════════════════════════
    // SCROLL ANIMATIONS
    // ═══════════════════════════════════════
    let observer;
    function observeCards() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

      document.querySelectorAll('.event-card').forEach(card => observer.observe(card));
    }

    // Progress bar
    const wrapper = document.getElementById('app');
    wrapper.addEventListener('scroll', () => {
      const scrollTop = wrapper.scrollTop;
      const scrollHeight = wrapper.scrollHeight - wrapper.clientHeight;
      const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
      document.getElementById('progress-bar').style.width = progress + '%';

      const cards = document.querySelectorAll('.event-card');
      let currentSection = '';
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.5) {
          const type = card.dataset.type;
          if (type === 'eligible') currentSection = '✓ من يستحق';
          else if (type === 'benefits') currentSection = '🎁 المميزات';
          else if (type === 'join') currentSection = '🚀 طرق الاشتراك';
        }
      });
      document.getElementById('current-era').textContent = currentSection;
      document.getElementById('progress-text').textContent = progress < 5 ? 'مرّر للاستكشاف' :
        progress > 95 ? 'اكتملت القراءة' : `${Math.round(progress)}% مكتشف`;
    });

    // Filter buttons
    document.getElementById('filter-container').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (btn) setFilter(btn.dataset.filter);
    });

    // ═══════════════════════════════════════
    // ELEMENT SDK
    // ═══════════════════════════════════════
    const defaultConfig = {
      campaign_title: 'حملة تحدي المحترفين',
      campaign_subtitle: 'انضم إلى أقوى الأفكار والمشاريع · فرصتك لتحقيق النجاح',
      footer_text: '🚀 حققّ أحلامك مع أفضل الفرص في السوق',
      background_color: '#0f0f23',
      surface_color: '#1a1a32',
      text_color: '#f5f0e8',
      primary_action_color: '#d4af37',
      secondary_action_color: '#a0977d',
      font_family: 'Cormorant Garamond',
      font_size: 16
    };

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;

      // Background
      document.getElementById('app').style.backgroundColor = bg;

      // Text content
      document.getElementById('main-title').textContent = config.campaign_title || defaultConfig.campaign_title;
      document.getElementById('main-subtitle').textContent = config.campaign_subtitle || defaultConfig.campaign_subtitle;
      document.getElementById('footer-text').textContent = config.footer_text || defaultConfig.footer_text;

      // Text color
      document.getElementById('main-title').style.color = text;

      // Secondary text
