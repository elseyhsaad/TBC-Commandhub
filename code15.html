<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الهروب من المصيدة</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; }
    
    #game-canvas {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .player {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      z-index: 20;
      transition: none;
    }

    .trap {
      position: absolute;
      z-index: 15;
      pointer-events: none;
    }

    .coin-box {
      position: absolute;
      z-index: 18;
      pointer-events: none;
      animation: coinPop 0.3s ease-out;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      width: 40px;
      height: 40px;
    }

    .score-popup {
      position: absolute;
      z-index: 50;
      font-weight: 900;
      font-size: 22px;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    @keyframes coinPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(255,200,0,0.6); }
      50% { box-shadow: 0 0 30px rgba(255,200,0,1); }
    }

    @keyframes trap-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .trap-blade {
      animation: trap-spin 1.5s linear infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .screen-shake {
      animation: shake 0.4s ease-out;
    }

    .bg-grid {
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .speed-lines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .progress-bar-inner {
      transition: width 0.3s linear;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="game-canvas" class="bg-grid" style="background-color: #0a0e1a;"><!-- Start Screen -->
   <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-40" style="background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0a0e1a 100%);">
    <div style="font-size: 60px; margin-bottom: 16px;">
     🏃‍♂️
    </div>
    <h1 id="title-text" class="text-4xl font-black mb-3" style="color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.5);">الهروب من المصيدة</h1>
    <p class="text-lg mb-8" style="color: #8899bb;">اهرب من المصائد واجمع النقاط!</p>
    <div class="mb-6 text-center" style="color: #667799;">
     <p class="mb-1">⬆️⬇️⬅️➡️ أو اسحب للتحرك</p>
     <p class="text-sm">السرعة تزيد كل لحظة.. كن سريعاً!</p>
    </div><button id="start-btn" class="px-10 py-4 rounded-xl font-bold text-xl cursor-pointer border-none" style="background: linear-gradient(135deg, #ffd700, #ff8c00); color: #0a0e1a; box-shadow: 0 0 30px rgba(255,215,0,0.4);" onmouseenter="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'"> ابدأ اللعبة 🚀 </button>
   </div><!-- Game Over Screen -->
   <div id="gameover-screen" class="absolute inset-0 flex flex-col items-center justify-center z-40 hidden" style="background: rgba(10,14,26,0.95);">
    <div style="font-size: 60px; margin-bottom: 16px;">
     💥
    </div>
    <h2 class="text-3xl font-black mb-2" style="color: #ff4444;">وقعت بالمصيدة!</h2>
    <p class="text-lg mb-4" style="color: #8899bb;">حاول مرة ثانية</p>
    <div id="final-score" class="text-5xl font-black mb-2" style="color: #ffd700;"></div>
    <p class="mb-1" style="color: #667799;">أعلى نتيجة</p>
    <div id="high-score-display" class="text-2xl font-bold mb-6" style="color: #ff8c00;"></div><button id="restart-btn" class="px-10 py-4 rounded-xl font-bold text-xl cursor-pointer border-none" style="background: linear-gradient(135deg, #ffd700, #ff8c00); color: #0a0e1a;" onmouseenter="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'"> العب مرة ثانية 🔄 </button>
   </div><!-- Win Screen -->
   <div id="win-screen" class="absolute inset-0 flex flex-col items-center justify-center z-40 hidden" style="background: rgba(10,14,26,0.95);">
    <div style="font-size: 60px; margin-bottom: 16px;">
     🏆
    </div>
    <h2 class="text-3xl font-black mb-2" style="color: #ffd700;">أنت بطل!</h2>
    <p class="text-lg mb-4" style="color: #8899bb;">نجيت 3 دقائق كاملة!</p>
    <div id="win-score" class="text-5xl font-black mb-2" style="color: #ffd700;"></div>
    <p class="mb-1" style="color: #667799;">أعلى نتيجة</p>
    <div id="win-high-score" class="text-2xl font-bold mb-6" style="color: #ff8c00;"></div><button id="replay-btn" class="px-10 py-4 rounded-xl font-bold text-xl cursor-pointer border-none" style="background: linear-gradient(135deg, #ffd700, #ff8c00); color: #0a0e1a;" onmouseenter="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'"> العب مرة ثانية 🔄 </button>
   </div><!-- HUD -->
   <div id="hud" class="absolute top-0 left-0 right-0 p-3 flex items-center justify-between z-30 hidden" style="background: linear-gradient(180deg, rgba(10,14,26,0.9), transparent);">
    <div class="flex items-center gap-3">
     <div class="text-sm font-bold" style="color: #667799;">
      النقاط
     </div>
     <div id="score-display" class="text-2xl font-black" style="color: #ffd700;">
      0
     </div>
    </div>
    <div class="flex-1 mx-4">
     <div class="w-full h-3 rounded-full overflow-hidden" style="background: rgba(255,255,255,0.1);">
      <div id="time-bar" class="progress-bar-inner h-full rounded-full" style="width: 100%; background: linear-gradient(90deg, #ff4444, #ff8c00, #ffd700);"></div>
     </div>
     <div class="flex justify-between mt-1"><span id="time-display" class="text-xs font-bold" style="color: #667799;">3:00</span> <span id="speed-label" class="text-xs font-bold" style="color: #ff8c00;">سرعة ×1</span>
     </div>
    </div>
    <div class="flex items-center gap-2"><span class="text-xs" style="color: #667799;">⚡</span>
     <div id="danger-dots" class="flex gap-1"></div>
    </div>
   </div><!-- Speed Lines Overlay -->
   <div id="speed-lines" class="speed-lines">
    <svg width="100%" height="100%" style="position:absolute;"><line x1="0" y1="0" x2="100%" y2="100%" stroke="rgba(255,140,0,0.1)" stroke-width="1" /> <line x1="20%" y1="0" x2="80%" y2="100%" stroke="rgba(255,140,0,0.08)" stroke-width="1" /> <line x1="100%" y1="0" x2="0" y2="100%" stroke="rgba(255,140,0,0.1)" stroke-width="1" /> <line x1="80%" y1="0" x2="20%" y2="100%" stroke="rgba(255,140,0,0.08)" stroke-width="1" />
    </svg>
   </div><!-- Player -->
   <div id="player" class="player hidden" style="background: radial-gradient(circle at 35% 35%, #ffd700, #ff8c00); box-shadow: 0 0 20px rgba(255,215,0,0.6); animation: pulse-glow 1.5s infinite;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px;">
     🏃
    </div>
   </div><!-- Containers for dynamic elements -->
   <div id="traps-container" class="absolute inset-0 pointer-events-none z-15"></div>
   <div id="coins-container" class="absolute inset-0 pointer-events-none z-18"></div>
   <div id="popups-container" class="absolute inset-0 pointer-events-none z-50"></div>
  </div>
  <script>
    // ===== CONFIG & SDK =====
    const defaultConfig = {
      game_title: 'الهروب من المصيدة',
      bg_color: '#0a0e1a',
      accent_color: '#ffd700',
      danger_color: '#ff4444',
      text_color: '#8899bb',
      surface_color: '#1a1040'
    };

    let config = { ...defaultConfig };


    // ===== GAME STATE =====
    const GAME_DURATION = 180; // 3 minutes
    const canvas = document.getElementById('game-canvas');
    let gameRunning = false;
    let score = 0;
    let highScore = 0;
    let timeLeft = GAME_DURATION;
    let playerX = 0, playerY = 0;
    let traps = [];
    let coins = [];
    let animFrame = null;
    let lastTime = 0;
    let trapSpawnTimer = 0;
    let coinSpawnTimer = 0;
    let difficultyMultiplier = 1;
    let keysDown = {};
    let touchStartX = 0, touchStartY = 0;
    let touchDirX = 0, touchDirY = 0;
    let isTouching = false;
    let gameTimerInterval = null;

    const playerEl = document.getElementById('player');
    const trapsContainer = document.getElementById('traps-container');
    const coinsContainer = document.getElementById('coins-container');
    const popupsContainer = document.getElementById('popups-container');

    // ===== TRAP TYPES =====
    function createTrapSVG(type, size) {
      const s = size;
      if (type === 'blade') {
        return `<svg width="${s}" height="${s}" viewBox="0 0 40 40" class="trap-blade">
          <polygon points="20,2 25,15 38,15 27,24 31,38 20,29 9,38 13,24 2,15 15,15" fill="#ff4444" opacity="0.9"/>
          <circle cx="20" cy="20" r="5" fill="#ff0000"/>
        </svg>`;
      } else if (type === 'spike') {
        return `<svg width="${s}" height="${s}" viewBox="0 0 40 40">
          <polygon points="20,0 40,40 0,40" fill="#ff3333" opacity="0.85"/>
          <polygon points="20,8 34,36 6,36" fill="#cc0000" opacity="0.6"/>
        </svg>`;
      } else {
        return `<svg width="${s}" height="${s}" viewBox="0 0 40 40">
          <rect x="4" y="4" width="32" height="32" rx="4" fill="none" stroke="#ff4444" stroke-width="3" opacity="0.8"/>
          <line x1="4" y1="4" x2="36" y2="36" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
          <line x1="36" y1="4" x2="4" y2="36" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
        </svg>`;
      }
    }

    // ===== SPAWN FUNCTIONS =====
    function spawnTrap() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const types = ['blade', 'spike', 'box'];
      const type = types[Math.floor(Math.random() * types.length)];
      const size = 34 + Math.random() * 16;
      
      // Spawn from edges
      let x, y, vx, vy;
      const side = Math.floor(Math.random() * 4);
      const baseSpeed = (1.5 + Math.random() * 2) * difficultyMultiplier;
      
      if (side === 0) { x = -size; y = Math.random() * h; vx = baseSpeed; vy = (Math.random() - 0.5) * baseSpeed; }
      else if (side === 1) { x = w + size; y = Math.random() * h; vx = -baseSpeed; vy = (Math.random() - 0.5) * baseSpeed; }
      else if (side === 2) { x = Math.random() * w; y = -size; vx = (Math.random() - 0.5) * baseSpeed; vy = baseSpeed; }
      else { x = Math.random() * w; y = h + size; vx = (Math.random() - 0.5) * baseSpeed; vy = -baseSpeed; }

      // Some traps chase the player
      if (Math.random() < 0.3 * difficultyMultiplier) {
        const dx = playerX - x;
        const dy = playerY - y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        vx = (dx / dist) * baseSpeed * 0.8;
        vy = (dy / dist) * baseSpeed * 0.8;
      }

      const el = document.createElement('div');
      el.className = 'trap';
      el.innerHTML = createTrapSVG(type, size);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      trapsContainer.appendChild(el);

      traps.push({ el, x, y, vx, vy, size, alive: true });
    }

    function spawnCoin() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const padding = 60;
      const x = padding + Math.random() * (w - padding * 2);
      const y = padding + Math.random() * (h - padding * 2);
      const values = [5, 10, 10, 15, 20, 20, 25, 30, 50];
      const value = values[Math.floor(Math.random() * values.length)];

      const colors = {
        5: '#44aa44', 10: '#44bb66', 15: '#55cc55',
        20: '#ddaa00', 25: '#ff8800', 30: '#ff6600', 50: '#ff00ff'
      };

      const el = document.createElement('div');
      el.className = 'coin-box';
      el.style.background = `linear-gradient(135deg, ${colors[value] || '#ffd700'}, ${colors[value] || '#ff8c00'}dd)`;
      el.style.color = '#fff';
      el.style.boxShadow = `0 0 12px ${colors[value] || '#ffd700'}88`;
      el.textContent = '+' + value;
      coinsContainer.appendChild(el);

      coins.push({ el, x, y, value, size: 40, alive: true, life: 3 + Math.random() * 3 });
    }

    function showScorePopup(x, y, value) {
      const el = document.createElement('div');
      el.className = 'score-popup';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.color = value >= 30 ? '#ff00ff' : '#ffd700';
      el.textContent = '+' + value;
      popupsContainer.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }

    // ===== COLLISION =====
    function circleRect(cx, cy, cr, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx * dx + dy * dy) < (cr * cr);
    }

    // ===== GAME LOGIC =====
    function updatePlayer(dt) {
      const speed = 280;
      let dx = 0, dy = 0;

      if (keysDown['ArrowUp'] || keysDown['w'] || keysDown['W']) dy = -1;
      if (keysDown['ArrowDown'] || keysDown['s'] || keysDown['S']) dy = 1;
      if (keysDown['ArrowLeft'] || keysDown['a'] || keysDown['A']) dx = -1;
      if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) dx = 1;

      if (isTouching) {
        dx = touchDirX;
        dy = touchDirY;
      }

      if (dx !== 0 || dy !== 0) {
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        playerX += (dx / len) * speed * dt;
        playerY += (dy / len) * speed * dt;
      }

      // Clamp to bounds
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      playerX = Math.max(18, Math.min(w - 18, playerX));
      playerY = Math.max(18, Math.min(h - 18, playerY));

      playerEl.style.left = (playerX - 18) + 'px';
      playerEl.style.top = (playerY - 18) + 'px';
    }

    function updateTraps(dt) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      for (let i = traps.length - 1; i >= 0; i--) {
        const t = traps[i];
        t.x += t.vx * 60 * dt;
        t.y += t.vy * 60 * dt;

        t.el.style.left = t.x + 'px';
        t.el.style.top = t.y + 'px';

        // Remove if way out of bounds
        if (t.x < -100 || t.x > w + 100 || t.y < -100 || t.y > h + 100) {
          t.el.remove();
          traps.splice(i, 1);
          continue;
        }

        // Collision with player
        const hitRadius = 14;
        const trapCenter = t.size / 2;
        if (circleRect(playerX, playerY, hitRadius, t.x, t.y, t.size, t.size)) {
          gameOver();
          return;
        }
      }
    }

    function updateCoins(dt) {
      for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        c.life -= dt;

        c.el.style.left = c.x + 'px';
        c.el.style.top = c.y + 'px';

        // Blink when about to expire
        if (c.life < 1.5) {
          c.el.style.opacity = Math.sin(c.life * 10) > 0 ? '1' : '0.3';
        }

        if (c.life <= 0) {
          c.el.remove();
          coins.splice(i, 1);
          continue;
        }

        // Collect
        const dx = playerX - (c.x + 20);
        const dy = playerY - (c.y + 20);
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
          score += c.value;
          document.getElementById('score-display').textContent = score;
          showScorePopup(c.x, c.y - 10, c.value);
          c.el.remove();
          coins.splice(i, 1);
        }
      }
    }

    function updateDifficulty() {
      const elapsed = GAME_DURATION - timeLeft;
      difficultyMultiplier = 1 + (elapsed / GAME_DURATION) * 3;
      
      const speedText = '×' + difficultyMultiplier.toFixed(1);
      document.getElementById('speed-label').textContent = 'سرعة ' + speedText;

      // Speed lines intensity
      const intensity = Math.min((difficultyMultiplier - 1) / 3, 1);
      document.getElementById('speed-lines').style.opacity = intensity * 0.5;

      // Danger dots
      const dots = document.getElementById('danger-dots');
      const level = Math.min(Math.floor(difficultyMultiplier), 5);
      let dotsHTML = '';
      for (let i = 0; i < 5; i++) {
        dotsHTML += `<div style="width:8px;height:8px;border-radius:50%;background:${i < level ? '#ff4444' : '#333'};"></div>`;
      }
      dots.innerHTML = dotsHTML;
    }

    function gameLoop(timestamp) {
      if (!gameRunning) return;

      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;

      // Spawn traps
      trapSpawnTimer -= dt;
      if (trapSpawnTimer <= 0) {
        const spawnCount = Math.ceil(difficultyMultiplier * 0.7);
        for (let i = 0; i < spawnCount; i++) spawnTrap();
        trapSpawnTimer = Math.max(0.3, 1.2 / difficultyMultiplier);
      }

      // Spawn coins
      coinSpawnTimer -= dt;
      if (coinSpawnTimer <= 0) {
        spawnCoin();
        coinSpawnTimer = Math.max(0.8, 2.5 / difficultyMultiplier);
      }

      updatePlayer(dt);
      updateTraps(dt);
      updateCoins(dt);
      updateDifficulty();

      animFrame = requestAnimationFrame(gameLoop);
    }

    function startGame() {
      // Reset
      score = 0;
      timeLeft = GAME_DURATION;
      difficultyMultiplier = 1;
      traps = [];
      coins = [];
      keysDown = {};
      trapSpawnTimer = 0.5;
      coinSpawnTimer = 1;

      trapsContainer.innerHTML = '';
      coinsContainer.innerHTML = '';
      popupsContainer.innerHTML = '';

      document.getElementById('score-display').textContent = '0';
      document.getElementById('time-bar').style.width = '100%';
      document.getElementById('time-display').textContent = '3:00';

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      playerX = w / 2;
      playerY = h / 2;

      playerEl.classList.remove('hidden');
      document.getElementById('hud').classList.remove('hidden');
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('win-screen').classList.add('hidden');

      gameRunning = true;
      lastTime = performance.now();

      // Timer
      if (gameTimerInterval) clearInterval(gameTimerInterval);
      gameTimerInterval = setInterval(() => {
        if (!gameRunning) return;
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          winGame();
          return;
        }
        const pct = (timeLeft / GAME_DURATION) * 100;
        document.getElementById('time-bar').style.width = pct + '%';
        const mins = Math.floor(timeLeft / 60);
        const secs = Math.floor(timeLeft % 60);
        document.getElementById('time-display').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }, 100);

      animFrame = requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      if (animFrame) cancelAnimationFrame(animFrame);
      if (gameTimerInterval) clearInterval(gameTimerInterval);

      canvas.classList.add('screen-shake');
      setTimeout(() => canvas.classList.remove('screen-shake'), 400);

      playerEl.classList.add('hidden');
      document.getElementById('hud').classList.add('hidden');

      if (score > highScore) highScore = score;

      document.getElementById('final-score').textContent = score + ' نقطة';
      document.getElementById('high-score-display').textContent = highScore + ' نقطة';
      document.getElementById('gameover-screen').classList.remove('hidden');
    }

    function winGame() {
      gameRunning = false;
      if (animFrame) cancelAnimationFrame(animFrame);
      if (gameTimerInterval) clearInterval(gameTimerInterval);

      playerEl.classList.add('hidden');
      document.getElementById('hud').classList.add('hidden');

      if (score > highScore) highScore = score;

      document.getElementById('win-score').textContent = score + ' نقطة';
      document.getElementById('win-high-score').textContent = highScore + ' نقطة';
      document.getElementById('win-screen').classList.remove('hidden');
    }

    // ===== INPUT HANDLERS =====
    document.addEventListener('keydown', e => {
      keysDown[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keysDown[e.key] = false; });

    // Touch controls
    canvas.addEventListener('touchstart', e => {
      if (!gameRunning) return;
      isTouching = true;
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchDirX = 0;
      touchDirY = 0;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      if (!gameRunning || !isTouching) return;
      const t = e.touches[0];
