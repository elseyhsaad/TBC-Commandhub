<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; }

    .bank-container {
      width: 341px;
      height: 341px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    /* Animated grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212, 175, 55, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212, 175, 55, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      animation: gridMove 4s linear infinite;
    }
    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(30px); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #d4af37;
      opacity: 0;
      animation: floatUp 3s ease-in-out infinite;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(100px) scale(0); }
      30% { opacity: 0.8; }
      70% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
    }

    /* Glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      animation: orbPulse 4s ease-in-out infinite alternate;
    }
    @keyframes orbPulse {
      0% { opacity: 0.15; transform: scale(1); }
      100% { opacity: 0.35; transform: scale(1.3); }
    }

    /* Scanning line */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      animation: scan 3s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes scan {
      0% { top: -2px; opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    /* Logo pulse ring */
    .pulse-ring {
      position: absolute;
      border: 1.5px solid #d4af37;
      border-radius: 50%;
      animation: pulseRing 2.5s ease-out infinite;
    }
    @keyframes pulseRing {
      0% { width: 60px; height: 60px; opacity: 0.7; }
      100% { width: 120px; height: 120px; opacity: 0; }
    }

    /* Shield icon animation */
    .shield-glow {
      filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
      animation: shieldPulse 2s ease-in-out infinite alternate;
    }
    @keyframes shieldPulse {
      0% { filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.4)); transform: scale(1); }
      100% { filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.8)); transform: scale(1.05); }
    }

    /* Title entrance */
    .title-text {
      animation: titleIn 1s ease-out 0.3s both;
    }
    @keyframes titleIn {
      0% { opacity: 0; transform: translateY(-15px); letter-spacing: 8px; }
      100% { opacity: 1; transform: translateY(0); letter-spacing: 2px; }
    }

    .subtitle-text {
      animation: subtitleIn 1s ease-out 0.6s both;
    }
    @keyframes subtitleIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Stats counter */
    .stat-item {
      animation: statIn 0.6s ease-out both;
    }

    /* CTA Button */
    .cta-btn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: btnIn 0.8s ease-out 1s both;
    }
    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }
    .cta-btn:active {
      transform: scale(0.97);
    }
    @keyframes btnIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      animation: btnShine 3s ease-in-out infinite;
    }
    @keyframes btnShine {
      0%, 70%, 100% { left: -60%; }
      50% { left: 120%; }
    }

    /* Hexagon decoration */
    .hex-border {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(0, 212, 255, 0.15);
      transform: rotate(45deg);
      animation: hexSpin 12s linear infinite;
    }
    @keyframes hexSpin {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }

    /* Data stream lines */
    .data-stream {
      position: absolute;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #00d4ff, transparent);
      opacity: 0.2;
      animation: streamFlow 2s linear infinite;
    }
    @keyframes streamFlow {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(465px); }
    }

    /* Corner accents */
    .corner-accent {
      position: absolute;
      width: 25px;
      height: 25px;
      border-color: rgba(212, 175, 55, 0.4);
      border-style: solid;
      border-width: 0;
    }
    .corner-tl { top: 10px; left: 10px; border-top-width: 2px; border-left-width: 2px; }
    .corner-tr { top: 10px; right: 10px; border-top-width: 2px; border-right-width: 2px; }
    .corner-bl { bottom: 10px; left: 10px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-br { bottom: 10px; right: 10px; border-bottom-width: 2px; border-right-width: 2px; }

    /* Number ticker */
    .ticker {
      display: inline-block;
      animation: tickerCount 2s ease-out 0.8s both;
    }
    @keyframes tickerCount {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #00ff88;
      animation: dotBlink 1.5s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body style="background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100%;">
  <div class="bank-container" id="bankContainer">
   <!-- Animated background layers -->
   <div class="grid-bg"></div><!-- Glow orbs -->
   <div class="orb" style="width:120px;height:120px;background:#d4af37;top:-30px;right:-30px;animation-delay:0s;"></div>
   <div class="orb" style="width:80px;height:80px;background:#00d4ff;bottom:60px;left:-20px;animation-delay:1.5s;"></div>
   <div class="orb" style="width:60px;height:60px;background:#1a1a1a;bottom:-20px;right:40px;animation-delay:3s;"></div><!-- Data streams -->
   <div class="data-stream" style="left:50px;height:80px;animation-delay:0s;"></div>
   <div class="data-stream" style="left:140px;height:60px;animation-delay:0.7s;"></div>
   <div class="data-stream" style="left:230px;height:90px;animation-delay:1.4s;"></div>
   <div class="data-stream" style="left:300px;height:50px;animation-delay:2.1s;"></div><!-- Scan line -->
   <div class="scan-line"></div><!-- Floating particles -->
   <div class="particle" style="left:15%;bottom:20%;animation-delay:0s;"></div>
   <div class="particle" style="left:40%;bottom:10%;animation-delay:0.5s;"></div>
   <div class="particle" style="left:65%;bottom:30%;animation-delay:1s;"></div>
   <div class="particle" style="left:85%;bottom:15%;animation-delay:1.5s;"></div>
   <div class="particle" style="left:30%;bottom:40%;animation-delay:2s;"></div>
   <div class="particle" style="left:70%;bottom:5%;animation-delay:2.5s;"></div><!-- Hex decorations -->
   <div class="hex-border" style="top:30px;left:20px;opacity:0.3;"></div>
   <div class="hex-border" style="bottom:80px;right:15px;opacity:0.2;animation-direction:reverse;"></div><!-- Corner accents -->
   <div class="corner-accent corner-tl"></div>
   <div class="corner-accent corner-tr"></div>
   <div class="corner-accent corner-bl"></div>
   <div class="corner-accent corner-br"></div><!-- Main content -->
   <div style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;">
    <!-- Title -->
    <div class="title-text" style="margin-bottom:4px;">
     <span id="storeTitle" style="font-size:22px;font-weight:900;color:#d4af37;text-shadow:0 0 20px rgba(212,175,55,0.3);">المتجر العام</span>
    </div>
    <div class="subtitle-text" style="margin-bottom:24px;">
     <span style="font-size:11px;color:rgba(212,175,55,0.7);letter-spacing:3px;text-transform:uppercase;">GENERAL STORE</span>
    </div><!-- Status bar -->
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:20px;animation:subtitleIn 1s ease-out 0.8s both;">
     <div class="status-dot"></div><span style="font-size:10px;color:#00ff88;letter-spacing:1px;">المتجر نشط • تسوق موثوق</span>
    </div><!-- Stats row -->
    <div style="display:flex;gap:12px;margin-bottom:28px;width:100%;">
     <div class="stat-item" style="flex:1;background:rgba(212,175,55,0.06);border:1px solid rgba(212,175,55,0.12);border-radius:10px;padding:10px 6px;animation-delay:0.9s;">
      <div style="font-size:18px;font-weight:900;color:#d4af37;" class="ticker" id="counter1">
       0
      </div>
      <div style="font-size:9px;color:rgba(255,255,255,0.45);margin-top:2px;">
       مشتركين
      </div>
     </div>
     <div class="stat-item" style="flex:1;background:rgba(212,175,55,0.06);border:1px solid rgba(212,175,55,0.12);border-radius:10px;padding:10px 6px;animation-delay:1.1s;">
      <div style="font-size:18px;font-weight:900;color:#d4af37;" class="ticker" id="counter2">
       0
      </div>
      <div style="font-size:9px;color:rgba(255,255,255,0.45);margin-top:2px;">
       عروض حصرية
      </div>
     </div>
     <div class="stat-item" style="flex:1;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);border-radius:10px;padding:10px 6px;animation-delay:1.3s;">
      <div style="font-size:18px;font-weight:900;color:#00d4ff;" class="ticker" id="counter3">
       0%
      </div>
      <div style="font-size:9px;color:rgba(255,255,255,0.45);margin-top:2px;">
       نمو مبيعات
      </div>
     </div>
    </div><!-- CTA Button --> <button class="cta-btn" id="ctaBtn" style="width:85%;padding:14px 24px;border-radius:12px;color:#fff;font-family:'Tajawal';font-size:16px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px;"> <span id="btnText">ادخل المتجر</span> <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> </button> <!-- Footer text -->
    <div style="margin-top:16px;animation:subtitleIn 1s ease-out 1.2s both;">
     <span style="font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:1px;">© 2025 GENERAL STORE</span>
    </div>
   </div>
  </div>
  <script>
    lucide.createIcons();

    // Animated counters
  function liveTicker(el, min, max, suffix = '') {
  if (!el) return;

  let current = Math.floor(Math.random() * (max - min) + min);

  function update() {
    let change = Math.floor(Math.random() * 40) - 20; // daha smooth

    current += change;

    if (current < min) current = min;
    if (current > max) current = max;

    el.textContent = current.toLocaleString() + suffix;

    setTimeout(update, 1000 + Math.random() * 1500);
  }

  update();
}


liveTicker(document.getElementById('counter1'), 7000, 12000);
liveTicker(document.getElementById('counter2'), 100, 500);
liveTicker(document.getElementById('counter3'), 26, 34, '%');

    // Button click effect
    document.getElementById('ctaBtn').addEventListener('click', function(e) {
      e.preventDefault();
      this.style.background = 'linear-gradient(135deg, #00d4ff, #d4af37)';
      this.querySelector('span').textContent = '...جاري الدخول';
      setTimeout(() => {
        this.style.background = 'linear-gradient(135deg, #d4af37, #b8860b)';
        this.querySelector('span').textContent = defaultConfig.button_text;
      }, 2000);
    });

    // Element SDK
    const defaultConfig = {
      store_title: 'المتجر العام',
      button_text: 'ادخل المتجر',
      background_color: '#0a0a0a',
      accent_color: '#d4af37',
      text_color: '#d4af37',
      font_family: 'Tajawal'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.store_title || defaultConfig.store_title;
        const btnText = config.button_text || defaultConfig.button_text;
        const bg = config.background_color || defaultConfig.background_color;
        const accent = config.accent_color || defaultConfig.accent_color;
        const textCol = config.text_color || defaultConfig.text_color;
        const font = config.font_family || defaultConfig.font_family;

        document.getElementById('storeTitle').textContent = title;
        document.getElementById('storeTitle').style.color = textCol;
        document.getElementById('btnText').textContent = btnText;
        document.getElementById('bankContainer').style.background = bg;
        document.body.style.background = bg;

        document.querySelectorAll('.stat-item .ticker').forEach(el => el.style.color = accent);
        document.getElementById('storeTitle').style.fontFamily = `${font}, sans-serif`;
        document.getElementById('btnText').style.fontFamily = `${font}, sans-serif`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['store_title', config.store_title || defaultConfig.store_title],
        ['button_text', config.button_text || defaultConfig.button_text]
      ])
    });
  </script>
