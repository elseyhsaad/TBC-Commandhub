  <style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; width:100%; overflow:hidden; font-family:'Tajawal',sans-serif; }

.game-box {
  width: 341px; height: 341px;
  background: #0a0a0a;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  border: 1.5px solid rgba(212,175,55,0.3);
}

/* Animated gradient border glow */
.game-box::before {
  content:''; position:absolute; inset:-2px; border-radius:18px; z-index:0;
  background: conic-gradient(from var(--angle,0deg), #d4af37, #e91e8a, #d4af37, #e91e8a, #d4af37);
  animation: rotateBorder 3s linear infinite;
  opacity: 0.5;
}
@property --angle { syntax:"<angle>"; initial-value:0deg; inherits:false; }
@keyframes rotateBorder { to { --angle:360deg; } }

.game-box::after {
  content:''; position:absolute; inset:1.5px; border-radius:15px; background:#0a0a0a; z-index:1;
}

.box-content { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px 12px; }

/* Floating particles */
.particle {
  position:absolute; border-radius:50%; z-index:2; pointer-events:none;
  animation: floatUp linear infinite;
  opacity:0;
}
@keyframes floatUp {
  0% { transform:translateY(0) scale(0); opacity:0; }
  20% { opacity:1; }
  80% { opacity:0.6; }
  100% { transform:translateY(-260px) scale(1); opacity:0; }
}

/* Shimmer on title */
.shimmer-text {
  background: linear-gradient(90deg, #d4af37 0%, #fff 25%, #d4af37 50%, #e91e8a 75%, #d4af37 100%);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

/* Tags */
.tag {
  display:inline-block; padding:2px 8px; border-radius:20px; font-size:9px; font-weight:700;
  animation: tagPulse 2s ease-in-out infinite;
}
@keyframes tagPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

/* CTA Button */
.cta-btn {
  background: linear-gradient(135deg, #d4af37, #e91e8a);
  border:none; color:#fff; font-family:'Tajawal',sans-serif; font-weight:700;
  font-size:12px; padding:8px 20px; border-radius:25px; cursor:pointer;
  position:relative; overflow:hidden; transition: transform 0.2s, box-shadow 0.2s;
}
.cta-btn:hover { transform:scale(1.05); box-shadow: 0 0 20px rgba(233,30,138,0.5); }
.cta-btn::after {
  content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  transform:skewX(-20deg); animation: btnShine 2.5s ease-in-out infinite;
}
@keyframes btnShine { 0%{left:-60%} 50%,100%{left:120%} }

/* Player count pulse */
.player-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; display:inline-block; animation: dotPulse 1.5s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

/* Page 2 - Games */
.games-page {
  position:absolute; inset:0; z-index:10; background:#0a0a0a;
  display:flex; flex-direction:column; align-items:center;
  transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y:auto; padding:14px 10px;
}
.games-page.open { transform:translateY(0); }

.game-card {
  width:100%; padding:10px; border-radius:10px; margin-bottom:8px; cursor:pointer;
  border:1px solid rgba(212,175,55,0.2); background:rgba(255,255,255,0.03);
  transition: transform 0.2s, border-color 0.2s;
}
.game-card:hover { transform:scale(1.02); border-color:#e91e8a; }
</style>

  <script>
// Particles
const particlesEl = document.getElementById('particles');
const colors = ['#d4af37','#e91e8a','#c084fc','#fff'];
function spawnParticle(){
  const p = document.createElement('div');
  p.className='particle';
  const size = Math.random()*4+2;
  p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:0;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*0.5}s;`;
  particlesEl.appendChild(p);
  setTimeout(()=>p.remove(), 5500);
}
setInterval(spawnParticle, 400);

// Player count
let playerCount = 4182;
const countEl = document.getElementById('playerCount');
function updateCount(){
  const delta = Math.floor(Math.random()*51)-25;
  playerCount = Math.max(4000, Math.min(4300, playerCount+delta));
  countEl.textContent = playerCount.toLocaleString('en');
}
setInterval(updateCount, 1000);

// Navigation

function closePage(){ document.getElementById('gamesPage').classList.remove('open'); }

// Element SDK
const defaultConfig = {
  main_title: 'العب واربح',
  button_text: 'ادخل الى عالمنا',
  bg_color: '#0a0a0a',
  gold_color: '#d4af37',
  pink_color: '#e91e8a',
  text_color: '#ffffff',
  accent_color: '#c084fc',
  font_family: 'Tajawal'
};

function applyConfig(config){
  const c = {...defaultConfig,...config};
  document.getElementById('mainTitle').textContent = c.main_title;
  document.getElementById('ctaBtnText').textContent = c.button_text;

  document.querySelectorAll('.shimmer-text').forEach(el=>{
    el.style.fontFamily = `${c.font_family}, Tajawal, sans-serif`;
  });
  document.querySelectorAll('.cta-btn, h2, .game-card div').forEach(el=>{
    el.style.fontFamily = `${c.font_family}, Tajawal, sans-serif`;
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async(config)=> applyConfig(config),
  mapToCapabilities:(config)=>({
    recolorables:[
      {get:()=>config.bg_color||defaultConfig.bg_color, set:v=>{config.bg_color=v;window.elementSdk.setConfig({bg_color:v})}},
      {get:()=>config.gold_color||defaultConfig.gold_color, set:v=>{config.gold_color=v;window.elementSdk.setConfig({gold_color:v})}},
      {get:()=>config.pink_color||defaultConfig.pink_color, set:v=>{config.pink_color=v;window.elementSdk.setConfig({pink_color:v})}},
      {get:()=>config.text_color||defaultConfig.text_color, set:v=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})}},
      {get:()=>config.accent_color||defaultConfig.accent_color, set:v=>{config.accent_color=v;window.elementSdk.setConfig({accent_color:v})}}
    ],
    borderables:[],
    fontEditable:{get:()=>config.font_family||defaultConfig.font_family, set:v=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})}},
    fontSizeable:undefined
  }),
  mapToEditPanelValues:(config)=>new Map([
    ['main_title', config.main_title||defaultConfig.main_title],
    ['button_text', config.button_text||defaultConfig.button_text]
  ])
});

lucide.createIcons();
</script>
