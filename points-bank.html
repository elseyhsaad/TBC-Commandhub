<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مخزن النقاط</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    html, body { height: 100%; margin: 0; }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
      50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.6); }
    }
    @keyframes shakeWrong {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    @keyframes celebrateBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes starFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.5); }
    }
    @keyframes progressFill {
      from { width: 0%; }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .float-in { animation: floatIn 0.5s ease-out forwards; }
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    .shake-wrong { animation: shakeWrong 0.4s ease-in-out; }
    .celebrate { animation: celebrateBounce 0.5s ease-in-out; }
    .slide-right { animation: slideRight 0.4s ease-out forwards; }

    .memory-card {
      perspective: 800px;
      cursor: pointer;
    }
    .memory-card .card-inner {
      transition: transform 0.5s;
      transform-style: preserve-3d;
      position: relative;
    }
    .memory-card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .memory-card .card-front, .memory-card .card-back {
      backface-visibility: hidden;
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .memory-card .card-back {
      transform: rotateY(180deg);
    }

    .timer-ring {
      stroke-dasharray: 283;
      transition: stroke-dashoffset 1s linear;
    }

    .btn-option {
      transition: all 0.2s ease;
    }
    .btn-option:hover {
      transform: translateY(-2px);
    }
    .btn-option:active {
      transform: translateY(0);
    }

    .grid-cell {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .grid-cell:hover {
      transform: scale(1.05);
    }

    .toast-msg {
      animation: floatIn 0.3s ease-out;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script  type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background: linear-gradient(135deg, #1a1a1a 0%, #2d1b2e 25%, #1a1a1a 50%, #2d1b2e 75%, #1a1a1a 100%); position: relative;">
  <div id="app" class="w-full h-full flex flex-col items-center justify-center p-4" style="min-height: 100%; position: relative; z-index: 1;">
   <!-- شاشة البداية -->
   <div id="start-screen" class="text-center float-in max-w-lg w-full">
    <div class="mb-8">
     <div class="text-6xl mb-4">
      🏆
     </div>
     <h1 id="main-title" class="text-5xl font-black mb-3" style="color: #fbbf24; text-shadow: 0 0 30px rgba(251,191,36,0.3);">مخزن النقاط</h1>
     <p class="text-lg mb-6" style="color: #94a3b8;">أكمل 10 تحديات متنوعة واجمع أكبر عدد من النقاط</p>
    </div>
    <div class="rounded-2xl p-6 mb-8" style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(251, 191, 36, 0.2);">
     <div class="grid grid-cols-2 gap-4 text-sm" style="color: #cbd5e1;">
      <div class="flex items-center gap-2"><span class="text-xl">🧠</span> ألغاز ذاكرة
      </div>
      <div class="flex items-center gap-2"><span class="text-xl">🔢</span> تحديات رياضية
      </div>
      <div class="flex items-center gap-2"><span class="text-xl">🎯</span> ألعاب تركيز
      </div>
      <div class="flex items-center gap-2"><span class="text-xl">⚡</span> سرعة بديهة
      </div>
     </div>
    </div><button onclick="startGame()" class="px-10 py-4 rounded-2xl text-xl font-bold transition-all hover:scale-105 active:scale-95 pulse-glow" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a;"> ابدأ المغامرة 🚀 </button>
   </div><!-- شاشة اللعب -->
   <div id="game-screen" class="hidden max-w-2xl w-full">
    <!-- الشريط العلوي -->
    <div class="flex items-center justify-between mb-6 rounded-2xl p-4" style="background: linear-gradient(135deg, rgba(26,26,26,0.9) 0%, rgba(45,27,46,0.8) 100%); border: 1px solid rgba(212,175,255,0.2);">
     <div class="flex items-center gap-3">
      <div class="text-2xl">
       🏆
      </div>
      <div>
       <div class="text-xs" style="color: #64748b;">
        النقاط
       </div>
       <div id="score-display" class="text-2xl font-black" style="color: #fbbf24;">
        0
       </div>
      </div>
     </div>
     <div class="text-center">
      <div class="text-xs" style="color: #64748b;">
       المرحلة
      </div>
      <div id="stage-display" class="text-lg font-bold" style="color: #e2e8f0;">
       1 / 10
      </div>
     </div>
     <div class="flex items-center gap-3">
      <div>
       <div class="text-xs text-left" style="color: #64748b;">
        الوقت
       </div>
       <div id="timer-display" class="text-2xl font-black" style="color: #38bdf8;">
        00:00
       </div>
      </div>
      <div class="text-2xl">
       ⏱️
      </div>
     </div>
    </div><!-- شريط التقدم -->
    <div class="rounded-full h-3 mb-6 overflow-hidden" style="background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(45,27,46,0.8));">
     <div id="progress-bar" class="h-full rounded-full transition-all duration-500" style="background: linear-gradient(90deg, #fbbf24, #ff69b4); width: 0%;"></div>
    </div><!-- منطقة التحدي -->
    <div id="challenge-area" class="rounded-2xl p-6" style="background: linear-gradient(135deg, rgba(26,26,26,0.9) 0%, rgba(45,27,46,0.9) 50%, rgba(26,26,26,0.9) 100%); border: 2px solid rgba(212,175,255,0.2); min-height: 400px;">
    </div>
    <div class="flex gap-3 mt-4 justify-center"><button onclick="skipChallenge()" id="skip-btn" class="px-6 py-3 rounded-xl font-bold text-lg transition-all hover:scale-105 active:scale-95" style="background: rgba(107, 114, 128, 0.4); border: 2px solid rgba(107, 114, 128, 0.5); color: #9ca3af;"> تخطي ⏭️ </button>
    </div><!-- رسالة التلميح -->
    <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-base font-bold z-50" style="background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(251, 191, 36, 0.3); color: #fbbf24;"></div>
   </div><!-- شاشة النتيجة -->
   <div id="result-screen" class="hidden text-center float-in max-w-lg w-full">
   </div>
  </div>
  <script>
  // ====== CONFIG & SDK ======
  const defaultConfig = {
    game_title: 'مخزن النقاط',
    background_color: '#0f172a',
    surface_color: '#1e293b',
    text_color: '#e2e8f0',
    primary_color: '#fbbf24',
    accent_color: '#38bdf8',
    font_family: 'Tajawal',
    font_size: 16
  };

  let config = { ...defaultConfig };

 

  // ====== GAME STATE ======
  let score = 0;
  let currentStage = 0;
  let totalTime = 0;
  let timerInterval = null;
  let stageTimerInterval = null;
  let stageTimeLeft = 0;
  let challengeActive = false;
  let skippedCount = 0;
  let firstSkipUsed = false;

  // ====== CHALLENGES DATA ======
  const challenges = [];

  function buildChallenges() {
    challenges.length = 0;

    // 1. تحدي الذاكرة - تذكر الأرقام
    challenges.push({
      type: 'memory_numbers',
      title: '🧠 تذكّر الأرقام',
      desc: 'احفظ تسلسل الأرقام ثم أعد كتابتها بالترتيب',
      timeLimit: 90
    });

    // 2. لغز رياضي
    challenges.push({
      type: 'math_puzzle',
      title: '🔢 اللغز الرياضي',
      desc: 'حل 5 معادلات رياضية قبل انتهاء الوقت',
      timeLimit: 80
    });

    // 3. تحدي الألوان - ستروب
    challenges.push({
      type: 'stroop',
      title: '🎨 تحدي الألوان',
      desc: 'اختر اللون الصحيح للكلمة وليس النص المكتوب',
      timeLimit: 60
    });

    // 4. ترتيب الكلمات
    challenges.push({
      type: 'word_order',
      title: '📝 رتّب الجملة',
      desc: 'أعد ترتيب الكلمات لتكوين جملة صحيحة',
      timeLimit: 75
    });

    // 5. تحدي الأنماط
    challenges.push({
      type: 'pattern',
      title: '🔮 أكمل النمط',
      desc: 'اكتشف النمط واختر الرقم التالي',
      timeLimit: 70
    });

    // 6. لعبة الذاكرة - تطابق البطاقات
    challenges.push({
      type: 'memory_cards',
      title: '🃏 تطابق البطاقات',
      desc: 'اعثر على جميع الأزواج المتطابقة',
      timeLimit: 90
    });

    // 7. تحدي التقدير
    challenges.push({
      type: 'estimation',
      title: '📏 تحدي التقدير',
      desc: 'قدّر الإجابة الأقرب للصحيحة',
      timeLimit: 60
    });

    // 8. تحدي الملاحظة
    challenges.push({
      type: 'observation',
      title: '👁️ تحدي الملاحظة',
      desc: 'اعثر على العنصر المختلف بسرعة',
      timeLimit: 45
    });

    // 9. تحدي الكلمة المخفية
    challenges.push({
      type: 'hidden_word',
      title: '🔤 الكلمة المخفية',
      desc: 'اكتشف الكلمة من خلال التلميحات',
      timeLimit: 90
    });

    // 10. التحدي الأخير - سريع
    challenges.push({
      type: 'rapid_fire',
      title: '⚡ الجولة السريعة',
      desc: 'أجب على 8 أسئلة سريعة متنوعة',
      timeLimit: 90
    });
  }

  // ====== CORE FUNCTIONS ======
  function startGame() {
    buildChallenges();
    score = 0;
    currentStage = 0;
    totalTime = 0;
    skippedCount = 0;
    firstSkipUsed = false;

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');

    updateUI();
    startGlobalTimer();
    loadChallenge();
  }

  function updateUI() {
    document.getElementById('score-display').textContent = score;
    document.getElementById('stage-display').textContent = `${currentStage + 1} / 10`;
    document.getElementById('progress-bar').style.width = `${(currentStage / 10) * 100}%`;
  }

  function startGlobalTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      totalTime++;
      const m = String(Math.floor(totalTime / 60)).padStart(2, '0');
      const s = String(totalTime % 60).padStart(2, '0');
      document.getElementById('timer-display').textContent = `${m}:${s}`;
    }, 1000);
  }

  function showToast(msg, duration = 2000) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.remove('hidden');
    toast.className = 'toast-msg fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-base font-bold z-50';
    toast.style.background = 'rgba(30, 41, 59, 0.95)';
    toast.style.border = '1px solid rgba(251, 191, 36, 0.3)';
    toast.style.color = '#fbbf24';
    setTimeout(() => toast.classList.add('hidden'), duration);
  }

  function startStageTimer(seconds, onEnd) {
    clearInterval(stageTimerInterval);
    stageTimeLeft = seconds;
    const timerEl = document.getElementById('stage-timer');
    if (timerEl) {
      timerEl.textContent = stageTimeLeft;
    }
    stageTimerInterval = setInterval(() => {
      stageTimeLeft--;
      const el = document.getElementById('stage-timer');
      if (el) el.textContent = stageTimeLeft;
      if (stageTimeLeft <= 0) {
        clearInterval(stageTimerInterval);
        if (onEnd) onEnd();
      }
    }, 1000);
  }

  function winStage() {
    clearInterval(stageTimerInterval);
    challengeActive = false;
    score++;
    updateUI();
    showToast('🎉 أحسنت! +1 نقطة');
    setTimeout(() => {
      currentStage++;
      if (currentStage >= 10) {
        endGame();
      } else {
        updateUI();
        loadChallenge();
      }
    }, 1500);
  }

  function loseStage() {
    clearInterval(stageTimerInterval);
    challengeActive = false;
    showToast('😔 لم تنجح هذه المرة');
    setTimeout(() => {
      currentStage++;
      if (currentStage >= 10) {
        endGame();
      } else {
        updateUI();
        loadChallenge();
      }
    }, 1500);
  }

  function endGame() {
    clearInterval(timerInterval);
    clearInterval(stageTimerInterval);

    document.getElementById('game-screen').classList.add('hidden');
    const resultScreen = document.getElementById('result-screen');
    resultScreen.classList.remove('hidden');
    resultScreen.classList.add('float-in');

    const m = String(Math.floor(totalTime / 60)).padStart(2, '0');
    const s = String(totalTime % 60).padStart(2, '0');

    let rank = '';
    let emoji = '';
    if (score >= 9) { rank = 'عبقري مطلق! 🧠✨'; emoji = '👑'; }
    else if (score >= 7) { rank = 'ذكي جداً! 🌟'; emoji = '🥇'; }
    else if (score >= 5) { rank = 'أداء جيد! 💪'; emoji = '🥈'; }
    else if (score >= 3) { rank = 'لا بأس، حاول مرة أخرى! 🔄'; emoji = '🥉'; }
    else { rank = 'تحتاج تمرين أكثر! 📚'; emoji = '💫'; }

    const stars = [];
    for (let i = 0; i < 10; i++) {
      stars.push(i < score ? '⭐' : '☆');
    }

    resultScreen.innerHTML = `
      <div class="mb-6">
        <div class="text-7xl mb-4 celebrate">${emoji}</div>
        <h2 class="text-4xl font-black mb-2" style="color: #fbbf24;">انتهت اللعبة!</h2>
        <p class="text-xl font-bold mb-1" style="color: #e2e8f0;">${rank}</p>
      </div>
      <div class="rounded-2xl p-6 mb-6" style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(251, 191, 36, 0.2);">
        <div class="text-3xl mb-4 tracking-wider">${stars.join(' ')}</div>
        <div class="grid grid-cols-3 gap-4">
          <div class="rounded-xl p-4" style="background: rgba(15, 23, 42, 0.6);">
            <div class="text-sm" style="color: #64748b;">النقاط</div>
            <div class="text-3xl font-black" style="color: #fbbf24;">${score}<span class="text-xs" style="color: #64748b;">/10</span></div>
          </div>
          <div class="rounded-xl p-4" style="background: rgba(15, 23, 42, 0.6);">
            <div class="text-sm" style="color: #64748b;">الوقت</div>
            <div class="text-3xl font-black" style="color: #38bdf8;">${m}:${s}</div>
          </div>
          <div class="rounded-xl p-4" style="background: rgba(15, 23, 42, 0.6);">
            <div class="text-sm" style="color: #64748b;">المتخطاة</div>
            <div class="text-3xl font-black" style="color: #ef4444;">${skippedCount}</div>
          </div>
        </div>
      </div>
      <div class="flex gap-4 justify-center">
        <button onclick="restartGame()" class="px-8 py-3 rounded-xl text-lg font-bold transition-all hover:scale-105 active:scale-95" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a;">
          أعد المحاولة 🔄
        </button>
      </div>
    `;
  }

  function restartGame() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
  }

  function skipChallenge() {
    if (!challengeActive) return;
    let cost = 0;
    let message = '';
    
    if (!firstSkipUsed) {
      // أول تخطي مجاني
      firstSkipUsed = true;
      message = '⏭️ تم التخطي (مجاني - أول مرة)';
    } else {
      // التخطيات التالية تكلف 3 نقاط
      if (score >= 3) {
        score -= 3;
        cost = 3;
        message = '⏭️ تم التخطي (-3 نقاط)';
      } else {
        showToast('❌ ليس لديك 3 نقاط كافية للتخطي!');
        return;
      }
    }
    
    skippedCount++;
    clearInterval(stageTimerInterval);
    challengeActive = false;
    updateUI();
    showToast(message);
    
    setTimeout(() => {
      currentStage++;
      if (currentStage >= 10) {
        endGame();
      } else {
        updateUI();
        loadChallenge();
      }
    }, 1000);
  }

  // ====== CHALLENGE LOADERS ======
  function loadChallenge() {
    challengeActive = true;
    const ch = challenges[currentStage];
    const area = document.getElementById('challenge-area');

    area.innerHTML = `
      <div class="float-in">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h3 class="text-2xl font-bold" style="color: #fbbf24;">${ch.title}</h3>
            <p class="text-sm" style="color: #94a3b8;">${ch.desc}</p>
          </div>
          <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background: rgba(56, 189, 248, 0.15); color: #38bdf8;">
            <span>⏱️</span>
            <span id="stage-timer" class="text-xl font-bold">${ch.timeLimit}</span>
            <span class="text-sm">ثانية</span>
          </div>
        </div>
        <div id="challenge-content" class="mt-6"></div>
      </div>
    `;

    // Load specific challenge
    switch (ch.type) {
      case 'memory_numbers': loadMemoryNumbers(); break;
      case 'math_puzzle': loadMathPuzzle(); break;
      case 'stroop': loadStroop(); break;
      case 'word_order': loadWordOrder(); break;
      case 'pattern': loadPattern(); break;
      case 'memory_cards': loadMemoryCards(); break;
      case 'estimation': loadEstimation(); break;
      case 'observation': loadObservation(); break;
      case 'hidden_word': loadHiddenWord(); break;
      case 'rapid_fire': loadRapidFire(); break;
    }
  }

  // ---- 1. Memory Numbers ----
  function loadMemoryNumbers() {
    const len = 6;
    const nums = [];
    for (let i = 0; i < len; i++) nums.push(Math.floor(Math.random() * 9) + 1);
    const content = document.getElementById('challenge-content');

    content.innerHTML = `
      <div class="text-center">
        <p class="text-lg mb-4" style="color: #e2e8f0;">احفظ هذه الأرقام خلال 5 ثوانٍ</p>
        <div id="nums-display" class="text-5xl font-black tracking-[0.3em] mb-6" style="color: #fbbf24;">${nums.join(' ')}</div>
        <div id="nums-input-area" class="hidden">
          <p class="mb-3" style="color: #94a3b8;">أدخل الأرقام بالترتيب:</p>
          <div class="flex justify-center gap-2 mb-4" id="num-inputs"></div>
          <button id="nums-submit" class="px-8 py-3 rounded-xl font-bold text-lg transition-all hover:scale-105" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a;">تحقق ✓</button>
        </div>
      </div>
    `;

    setTimeout(() => {
      if (!challengeActive) return;
      document.getElementById('nums-display').classList.add('hidden');
      document.getElementById('nums-input-area').classList.remove('hidden');
      const inputsContainer = document.getElementById('num-inputs');
      for (let i = 0; i < len; i++) {
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.min = '1'; inp.max = '9';
        inp.className = 'w-12 h-14 text-center text-xl font-bold rounded-lg border-2 focus:outline-none';
        inp.style.cssText = 'background: rgba(15,23,42,0.8); border-color: rgba(251,191,36,0.3); color: #fbbf24;';
        inp.dataset.idx = i;
        inp.addEventListener('input', function() {
          if (this.value.length >= 1) {
            const next = inputsContainer.children[parseInt(this.dataset.idx) + 1];
            if (next) next.focus();
          }
        });
        inputsContainer.appendChild(inp);
      }
      inputsContainer.children[0].focus();

      startStageTimer(challenges[currentStage].timeLimit - 5, () => loseStage());

      document.getElementById('nums-submit').addEventListener('click', () => {
        const inputs = inputsContainer.querySelectorAll('input');
        let correct = true;
        inputs.forEach((inp, i) => {
          if (parseInt(inp.value) !== nums[i]) correct = false;
        });
        if (correct) winStage();
        else {
          showToast('❌ تسلسل خاطئ، حاول مرة أخرى');
          inputs.forEach(inp => { inp.value = ''; inp.classList.add('shake-wrong'); });
          setTimeout(() => inputs.forEach(inp => inp.classList.remove('shake-wrong')), 400);
          inputs[0].focus();
        }
      });
    }, 5000);
  }

  // ---- 2. Math Puzzle ----
  function loadMathPuzzle() {
    let solved = 0;
    const total = 5;
    const content = document.getElementById('challenge-content');

    function genProblem() {
      const ops = ['+', '-', '×'];
      const op = ops[Math.floor(Math.random() * ops.length)];
      let a, b, answer;
      if (op === '+') { a = Math.floor(Math.random() * 50) + 10; b = Math.floor(Math.random() * 50) + 10; answer = a + b; }

      else { a = Math.floor(Math.random() * 12) + 2; b = Math.floor(Math.random() * 12) + 2; answer = a * b; }
      return { text: `${a} ${op} ${b} = ?`, answer };

      const p = genProblem();

      wrongAnswers.add(p.answer);

    let canFlip = true;
    const content = document.getElementById('challenge-content');

    function render() {
      content.innerHTML = `
        <div class="grid grid-cols-4 gap-3 max-w-sm mx-auto">
          ${cards.map((emoji, i) => {
            const isFlipped = flipped.includes(i) || matched.includes(i);
            return `
              <div class="memory-card ${isFlipped ? 'flipped' : ''}" onclick="flipCard(${i})" style="width: 100%; aspect-ratio: 1;">
                <div class="card-inner w-full h-full">
                  <div class="card-front" style="background: linear-gradient(135deg, #1e293b, #334155); border: 2px solid rgba(251,191,36,0.3);">

                  </div>
                  <div class="card-back" style="background: ${matched.includes(i) ? 'rgba(34,197,94,0.2)' : 'rgba(251,191,36,0.1)'}; border: 2px solid ${matched.includes(i) ? '#22c55e' : '#fbbf24'};">

                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    window.flipCard = function(idx) {
      if (!challengeActive || !canFlip || flipped.includes(idx) || matched.includes(idx)) return;
      flipped.push(idx);
      render();

      if (flipped.length === 2) {
        canFlip = false;
        const [a, b] = flipped;
        if (cards[a] === cards[b]) {
          matched.push(a, b);
          flipped = [];
          canFlip = true;
          render();
          if (matched.length === cards.length) winStage();
        } else {
          setTimeout(() => { flipped = []; canFlip = true; render(); }, 800);
        }
      }
    };

    startStageTimer(challenges[currentStage].timeLimit, () => loseStage());
    render();
  }

        showToast('❌', 400);
      }
      qIdx++;
      if (qIdx >= 8) {
        if (correct >= 5) winStage();
        else loseStage();
      } else {
        setTimeout(showQ, 500);
      }
    };

    startStageTimer(challenges[currentStage].timeLimit, () => loseStage());
    showQ();
  }

  // Init Lucide
  lucide.createIcons();
