function detectIntent(msg) {
  const m = msg.toLowerCase();
  if (/من انت|شو اسمك|مين انت|من أنت|who are you|about you/.test(m)) return 'identity';
  if (/تداول|trading|سوق/.test(m)) return 'trading';
  if (/دولار|تصريف|نقط|سعر|عمل/.test(m)) return 'dollar';
  if (/صاحب|مؤسس|شركا|مين|سعد|حمز|طاهر|عبد|رايت|تورك|نادي/.test(m)) return 'founders';
  if (/ميز|فرق|خاص|ليش|احسن/.test(m)) return 'features';
  if (/استراتيج|رؤي|هدف|توجه|مستقبل|خطة/.test(m)) return 'strategy';
  if (/قسم|اقسام|خدم|حساب/.test(m)) return 'sections';
  if (/لعب|ألعاب|games|gaming|تحدي|مسل|حماس/.test(m)) return 'games';
  if (/حمل|campaign|campaigns|من|لمن|اللي|مستهدف/.test(m)) return 'campaigns';
  if (/عرض|offers|deals|ديل|خصم/.test(m)) return 'offers';
  if (/منج|ذهب|gold|mining/.test(m)) return 'mining';
  if (/اشترك|نشترك|كيف اشترك|بدي اشترك|معكم|حساب|كيف|subscription|join|register|sign up/.test(m)) return 'subscription';
  if (/اجور|رسوم|تكاليف|كم تربح|إيرادات|fees|revenue|profit|كيف تربحو|شو الاجور/.test(m)) return 'fees';
  if (/مرحب|هلا|هاي|hi|hello|اهل|السلام/.test(m)) return 'greet';
  return 'unknown';
}

function getQuickActions(intent) {
  const all = [
    { label: '📊 سوق التداول', value: 'شو هو سوق التداول؟' },
    { label: '💱 سعر الدولار', value: 'شو سعر الدولار؟' },
    { label: '👑 المؤسسون', value: 'مين أصحاب المشروع؟' },
    { label: '⭐ الميزات', value: 'شو ميزات الكوماند هاب؟' },
    { label: '🎯 الاستراتيجية', value: 'شو استراتيجيتكم؟' },
    { label: '⛏️ منجم الذهب', value: 'شو هو منجم الذهب؟' },
  ];
  return all.filter(a => !a.value.toLowerCase().includes(intent === 'trading' ? 'تداول' : intent === 'dollar' ? 'دولار' : '___'));
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#e8d48b;">$1</strong>')
    .replace(/\n/g, '<br>');
}

function addMessage(text, isUser) {
  const div = document.createElement('div');
  div.className = `msg-anim flex ${isUser ? 'justify-start' : 'justify-end'}`;
  const bubble = document.createElement('div');
  bubble.className = `max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed`;
  if (isUser) {
    bubble.style.cssText = 'background: linear-gradient(135deg, #c8a84e22, #c8a84e11); border: 1px solid rgba(200,168,78,0.2); color: #e8d48b;';
  } else {
    bubble.style.cssText = 'background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #e0e0e0;';
  }
  bubble.innerHTML = formatText(text);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg-anim flex justify-end';
  div.innerHTML = `<div class="rounded-2xl px-5 py-3 flex gap-1.5 items-center" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);">
    <span class="w-2 h-2 rounded-full bg-yellow-500 dot1"></span>
    <span class="w-2 h-2 rounded-full bg-yellow-500 dot2"></span>
    <span class="w-2 h-2 rounded-full bg-yellow-500 dot3"></span>
  </div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showQuickActions(intent) {
  const actions = getQuickActions(intent);
  quickEl.innerHTML = '';
  quickEl.style.display = 'flex';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'card-hover text-xs px-3 py-1.5 rounded-full border transition';
    btn.style.cssText = 'border-color: rgba(200,168,78,0.3); color: #c8a84e; background: rgba(200,168,78,0.08);';
    btn.textContent = a.label;
    btn.onclick = () => handleSend(a.value);
    quickEl.appendChild(btn);
  });
}

  btn.className = 'card-hover flex items-center gap-2 text-sm px-4 py-2.5 rounded-full border transition';
  btn.style.cssText = 'border-color: #25d366; color: #25d366; background: rgba(37,211,102,0.1); text-decoration: none; display: inline-flex; align-items: center; gap: 8px;';
  btn.innerHTML = `<i data-lucide="message-circle" style="width:18px;height:18px;"></i> تواصل معنا عبر واتساب`;
  
  quickEl.appendChild(btn);
  lucide.createIcons();
}

function handleSend(text) {
  if (!text.trim()) return;
  addMessage(text, true);
  const intent = detectIntent(text);
  showTyping();
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    removeTyping();
    const reply = intent === 'unknown' ? KB[intent](text) : KB[intent]();
    addMessage(reply, false);
    if (intent === 'unknown') {
      showContactButton();
    } else {
      showQuickActions(intent);
    }
  }, delay);
}

function resetChat() {
  messagesEl.innerHTML = '';
  chatHistory = [];
  quickEl.style.display = 'none';
  setTimeout(() => {
    addMessage(KB.greet(), false);
    showQuickActions('greet');
  }, 300);
}

// Form
document.getElementById('chat-form').addEventListener('submit', e => {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  handleSend(input.value);
  input.value = '';
});

// Element SDK
function applyConfig(c) {
  document.getElementById('header-title').textContent = c.bot_name || defaultConfig.bot_name;
}



// Init
lucide.createIcons();
setTimeout(() => {
  addMessage(KB.greet(), false);
  showQuickActions('greet');
}, 500);
